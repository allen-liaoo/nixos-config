# alsblog 
server {
    server_name blog.allenl.me;

    listen 8443 ssl; 
    listen [::]:8443 ssl;

    root /usr/share/nginx/blog;
    index index.html;
    include mime.types;
    default_type application/octet-stream;

	error_page 404 /404.html;

    location / {
	    autoindex on;
        try_files $uri $uri/ =404;
    }

	location = /404.html {
	    internal; # user can't view 404.html directly
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}